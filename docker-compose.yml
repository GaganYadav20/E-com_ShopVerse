version: '3.8'

services:
  # MySQL Database
  mysql:
    image: mysql:8.0
    container_name: ecomm-mysql
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: ecommerce_db
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./database/schema.sql:/docker-entrypoint-initdb.d/schema.sql
    networks:
      - ecomm-network

  # Spring Boot Backend
  backend:
    build: ./backend
    container_name: ecomm-backend
    ports:
      - "8080:8080"
    environment:
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql:3306/ecommerce_db?createDatabaseIfNotExist=true&useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
      SPRING_DATASOURCE_USERNAME: root
      SPRING_DATASOURCE_PASSWORD: root
    depends_on:
      - mysql
    networks:
      - ecomm-network

  # React Frontend
  frontend:
    build: ./frontend
    container_name: ecomm-frontend
    ports:
      - "80:80"
    depends_on:
      - backend
    networks:
      - ecomm-network

volumes:
  mysql_data:

networks:
  ecomm-network:
    driver: bridge
